<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Agent Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🌤️ Weather Agent</h1>
            <p class="subtitle">Intelligent weather assistance powered by AI</p>
        </header>

        <main class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message">
                    <h2>Welcome to Weather Agent</h2>
                    <p>Ask me about weather in any city. I'll provide current conditions, forecasts, and helpful insights.</p>
                    <div class="example-queries">
                        <p>Try asking:</p>
                        <div id="examplesList"></div>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <form id="queryForm" class="query-form">
                    <input
                        type="text"
                        id="queryInput"
                        placeholder="Ask about weather... (e.g., 'What's the weather in London?')"
                        autocomplete="off"
                    >
                    <button type="submit" id="sendButton" class="send-button">Send</button>
                </form>
                <div id="loadingIndicator" class="loading-indicator hidden">
                    <span class="spinner"></span>
                    <span>Agent is thinking...</span>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>Using OpenWeather API | Powered by Claude AI</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
